---
services:
  vault:
    image: hashicorp/vault:1.19
    container_name: vault-0
    ports:
    - 8200:8200
    restart: on-failure:10
    healthcheck:
      retries: 5
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: 00000000-0000-0000-0000-000000000000
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOCAL_CONFIG: |
        {
          "ui": true
        }
    cap_add:
    - IPC_LOCK
    volumes:
    - vault-volume:/data
    command: server -dev -dev-root-token-id="00000000-0000-0000-0000-000000000000"
  postgres:
    image: postgres:17.4
    container_name: postgres-0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
    - 5432:5432
    volumes:
    - postgres-volume:/var/lib/postgresql/data
    - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
  zookeper-0:
    image: confluentinc/cp-zookeeper:7.9.0
    hostname: zookeper-0
    container_name: zookeper-0
    ports:
    - 2181:2181
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_SERVERS: zookeper-0:2888:3888
  kafka-0:
    image: confluentinc/cp-kafka:7.9.0
    hostname: kafka-0
    container_name: kafka-0
    ports:
    - 9092:9092
    - 29092:29092
    - 9999:9999
    environment:
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-0:19092,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092,DOCKER://host.docker.internal:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,DOCKER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: zookeper-0:2181
      KAFKA_BROKER_ID: 1
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: "${DOCKER_HOST_IP:-127.0.0.1}"
      KAFKA_AUTHORIZER_CLASS_NAME: kafka.security.authorizer.AclAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
    depends_on:
    - zookeper-0
volumes:
  vault-volume: null
  postgres-volume: null
