---
name: "Java CI with Maven"
"on":
  push: null
  pull_request: null
jobs:
  build:
    runs-on: "ubuntu-22.04"
    permissions:
      contents: "write"
    steps:
    - uses: "actions/checkout@v4"
    - name: "Set up JDK 17"
      uses: "actions/setup-java@v4"
      with:
        java-version: "17"
        distribution: "temurin"
        cache: "maven"
    - name: "Resolve Maven Dependencies"
      continue-on-error: true
      run: |
        mvn dependency:resolve
    - name: "Resolve Maven Plugins"
      continue-on-error: true
      run: |
        mvn dependency:resolve-plugins
    - name: "Install buf"
      continue-on-error: false
      run: |
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          ARCH="x86_64"
        elif [ "$ARCH" = "aarch64" ]; then
          ARCH="arm64"
        else
          echo "Unsupported architecture: $ARCH"
          exit 1
        fi
        echo "Architecture: $ARCH"
        curl -sSL "https://github.com/bufbuild/buf/releases/download/v1.50.0/buf-Linux-${ARCH}" -o /usr/local/bin/buf
        chmod +x /usr/local/bin/buf
    - name: "Check formatting"
      continue-on-error: false
      run: |
        mvn spotless:check
    - name: "Build with Maven"
      continue-on-error: true
      run: |
        cd tools/build
        chmod +x ./compile.sh
        ./compile.sh
    - name: "Check FileSystem"
      continue-on-error: true
      run: |
        pwd
        ls
        cat fleet-protobuf/location/location.proto
        cd driver-connection-service/src/main
        pwd
        ls
        cd protobuf
        pwd
        ls
        cd location
        pwd
        ls
    - name: "Dependabot - Update dependency graph"
      uses: "advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6"
