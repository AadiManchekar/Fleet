---
name: "Java CI with Maven"
"on":
  push: null
  pull_request: null
jobs:
  build:
    runs-on: "ubuntu-22.04"
    permissions:
      contents: "write"
    steps:
    - uses: "actions/checkout@v4"
    - name: "Set up JDK 17"
      uses: "actions/setup-java@v4"
      with:
        java-version: "17"
        distribution: "temurin"
        cache: "maven"
    - name: "Install buf"
      run: |
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          ARCH="x86_64"
        elif [ "$ARCH" = "aarch64" ]; then
          ARCH="arm64"
        else
          echo "Unsupported architecture: $ARCH"
          exit 1
        fi
        echo "Architecture: $ARCH"
        curl -sSL "https://github.com/bufbuild/buf/releases/download/v1.50.0/buf-Linux-${ARCH}" -o /usr/local/bin/buf
        chmod +x /usr/local/bin/buf
    - name: "Build with Maven"
      run: |
        cd fleet
        mvn clean install
    - name: "Dependabot - Update dependency graph"
      run: |
        cd fleet
        advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
